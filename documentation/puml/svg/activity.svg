<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="891px" preserveAspectRatio="none" style="width:649px;height:891px;background:#FFFFFF;" version="1.1" viewBox="0 0 649 891" width="649px" zoomAndPan="magnify"><defs/><g><ellipse cx="358.25" cy="20" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="242" x="237.25" y="50"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="222" x="247.25" y="72.8281">User selects 3BLD + category (0-7) in UI</text><polygon fill="#F1F1F1" points="311.25,106.3441,405.25,106.3441,417.25,118.3441,405.25,130.3441,311.25,130.3441,299.25,118.3441,311.25,106.3441" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="94" x="311.25" y="122.6121">multi-cycle mode?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17" x="282.25" y="115.1211">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="124" x="417.25" y="115.1211">no &#8212; single-cycle mode</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="271" x="77.5" y="140.3441"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="251" x="87.5" y="163.1722">Initialize empty cube state (cp=identity, co=0)</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="202" x="112" y="196.6882"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="182" x="122" y="219.5163">Initialize empty used-corners set</text><rect fill="#F1F1F